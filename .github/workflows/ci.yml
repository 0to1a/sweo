name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Log commit SHA
        run: echo "Triggered by commit ${{ github.event.pull_request.head.sha }}"

      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run tests
        run: go test ./... -count=1

  build-be:
    name: Build BE
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test
    steps:
      - name: Log commit SHA
        run: echo "Triggered by commit ${{ github.event.pull_request.head.sha }}"

      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build binary
        run: go build -o sweo ./cmd/sweo/

      - name: Verify binary
        run: ls -lh sweo

  build-fe:
    name: Build FE
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test
    steps:
      - name: Log commit SHA
        run: echo "Triggered by commit ${{ github.event.pull_request.head.sha }}"

      - uses: actions/checkout@v4

      - name: Check frontend exists
        id: check-fe
        run: |
          if [ -f frontend/package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No frontend found, skipping build"
          fi

      - name: Set up Bun
        if: steps.check-fe.outputs.exists == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1"

      - name: Install dependencies
        if: steps.check-fe.outputs.exists == 'true'
        working-directory: frontend
        run: bun install

      - name: Build frontend
        if: steps.check-fe.outputs.exists == 'true'
        working-directory: frontend
        run: bun run build

      - name: Verify build output
        if: steps.check-fe.outputs.exists == 'true'
        run: ls -lh frontend/dist
