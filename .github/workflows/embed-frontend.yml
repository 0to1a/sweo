name: Embed Frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"

permissions:
  contents: write

jobs:
  embed:
    name: Build & Embed Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1"

      - name: Install dependencies
        working-directory: frontend
        run: bun install

      - name: Build frontend
        working-directory: frontend
        run: bun run build

      - name: Sync dist to embedded directory
        run: |
          rm -rf internal/server/frontend_dist/assets
          cp -r frontend/dist/* internal/server/frontend_dist/

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet internal/server/frontend_dist/ && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit & push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add internal/server/frontend_dist/
          git commit -m "chore: auto-embed frontend dist"
          git push
